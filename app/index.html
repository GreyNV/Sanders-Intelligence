<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanders Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Inline splash: prevents blank black screen before React mounts -->
    <style>
      html, body { background: #0f1117; margin: 0; }
      #splash {
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
      }
      #splash-ring {
        width: 32px;
        height: 32px;
        border: 3px solid #2e3250;
        border-top-color: #6c8aff;
        border-radius: 50%;
        animation: splash-spin 0.75s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash"><div id="splash-ring"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
